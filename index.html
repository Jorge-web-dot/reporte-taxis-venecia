<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Taxis - Venecia</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h1 { text-align: center; color: #d4af37; font-size: 1.2em; text-transform: uppercase; letter-spacing: 2px; }
        
        .section { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #d4af37; }
        label { display: block; font-size: 0.75em; color: #d4af37; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 1em; }
        
        /* Estilos Buscador */
        .search-container { position: relative; }
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: #222; border: 1px solid #d4af37; border-radius: 0 0 8px 8px; z-index: 100; max-height: 150px; overflow-y: auto; display: none; margin-top: -15px; }
        .search-results div { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
        .search-results div:hover { background: #d4af37; color: black; }

        /* Botones de Opción */
        .tipo-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-tipo { flex: 1; padding: 10px; border: 1px solid #d4af37; background: transparent; color: #d4af37; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .btn-tipo.active { background: #d4af37; color: black; }

        .btn-gold { background: #d4af37; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 12px; border-radius: 8px; font-size: 0.9em; cursor: pointer; margin-bottom: 10px; width: 100%; font-weight: bold; }

        .tabla-resumen { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        .tabla-resumen th { background: #d4af37; color: black; padding: 8px; border: 1px solid #333; }
        .tabla-resumen td { padding: 8px; border: 1px solid #333; text-align: center; background: #111; }
        
        .fila-total { background: #222; color: #ffffff !important; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #1a1a1a; margin: 10% auto; padding: 20px; border: 1px solid #d4af37; width: 95%; max-width: 600px; border-radius: 12px; position: relative; }
        
        .flex-inputs { display: flex; gap: 10px; }
        .flex-inputs div { flex: 1; }
        .btn-cerrar { background: #ff4444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; margin-bottom: 10px; }
        .btn-del { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 1.2em; font-weight: bold; }
        .btn-edit { background: none; border: none; color: #d4af37; cursor: pointer; font-size: 1.1em; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>CONTROL VENECIA</h1>
    <div class="section">
        <label>Fecha</label>
        <input type="date" id="fecha-reg">

        <label>Buscar Taxista</label>
        <div class="search-container">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="busqueda-taxista" placeholder="Escribir nombre..." autocomplete="off">
                <button class="btn-outline" style="width: 50px;" onclick="abrirAdmin('taxistas')">+</button>
            </div>
            <div id="resultados-busqueda" class="search-results"></div>
        </div>

        <label>Tipo de Registro</label>
        <div class="tipo-selector">
            <button id="btn-botella" class="btn-tipo active" onclick="setTipo('Botella')">BOTELLA</button>
            <button id="btn-bono" class="btn-tipo" onclick="setTipo('Bono')">BONO</button>
        </div>

        <div id="campos-dinamicos">
            <div class="flex-inputs">
                <div id="cont-precio">
                    <label>Precio Botella</label>
                    <input type="number" id="precio-botella" placeholder="0.00">
                </div>
                <div>
                    <label id="label-monto">Comisión</label>
                    <input type="number" id="monto-comision" placeholder="0.00">
                </div>
            </div>
        </div>

        <button class="btn-gold" onclick="guardarComision()">GUARDAR REGISTRO</button>
    </div>
    <button class="btn-outline" onclick="verResumen()">VER RESUMEN DE FECHA</button>
</div>

<div id="modalResumen" class="modal">
    <div class="modal-content">
        <button class="btn-cerrar" onclick="cerrarResumen()">CERRAR X</button>
        <h2 id="titulo-fecha" style="color:#d4af37; font-size:1.1em; text-align:center; text-transform: uppercase; margin-top: 40px;"></h2>
        <table class="tabla-resumen">
            <thead>
                <tr>
                    <th>TAXISTA</th>
                    <th>TIPO</th>
                    <th>PRECIO B.</th>
                    <th>PAGO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="body-resumen"></tbody>
            <tfoot id="foot-resumen"></tfoot>
        </table>
    </div>
</div>

<div id="modalAdmin" class="modal">
    <div class="modal-content">
        <h3 id="tituloAdmin" style="color:#d4af37; margin-top:0;">ADMINISTRAR TAXISTAS</h3>
        <input type="text" id="nuevo-item" placeholder="Nombre del taxista...">
        <button class="btn-gold" onclick="agregarItem()">AGREGAR A LA LISTA</button>
        <div id="lista-items" style="margin-top:15px; max-height:200px; overflow-y:auto; font-size:0.8em; background: #000; padding: 5px;"></div>
        <button class="btn-gold" style="background:#444; color:white; margin-top:10px;" onclick="cerrarModal()">VOLVER</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKJ0vJGvnzIdkKIvD1w0NCStA19T-TzoM",
        authDomain: "venecia-control.firebaseapp.com",
        projectId: "venecia-control",
        storageBucket: "venecia-control.firebasestorage.app",
        messagingSenderId: "486778694402",
        appId: "1:486778694402:web:4276617163b85b5b7bf01b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let taxistasLista = [];
    let tipoSeleccionado = 'Botella';
    let taxistaSeleccionado = "";

    document.getElementById('fecha-reg').value = new Date().toISOString().split('T')[0];
    
    // Cargar taxistas y activar buscador
    db.collection("config_taxis").doc("taxistas").onSnapshot(doc => { 
        if(doc.exists) taxistasLista = doc.data().nombres || [];
    });

    const inputBusqueda = document.getElementById('busqueda-taxista');
    const resultados = document.getElementById('resultados-busqueda');

    inputBusqueda.addEventListener('input', () => {
        const p = inputBusqueda.value.toLowerCase();
        resultados.innerHTML = "";
        if(!p) { resultados.style.display = "none"; return; }
        
        const filtrados = taxistasLista.filter(n => n.toLowerCase().includes(p));
        if(filtrados.length > 0) {
            filtrados.forEach(f => {
                const div = document.createElement('div');
                div.innerText = f;
                div.onclick = () => {
                    inputBusqueda.value = f;
                    taxistaSeleccionado = f;
                    resultados.style.display = "none";
                };
                resultados.appendChild(div);
            });
            resultados.style.display = "block";
        } else {
            resultados.style.display = "none";
        }
    });

    function setTipo(t) {
        tipoSeleccionado = t;
        document.getElementById('btn-botella').classList.toggle('active', t === 'Botella');
        document.getElementById('btn-bono').classList.toggle('active', t === 'Bono');
        
        if(t === 'Bono') {
            document.getElementById('cont-precio').style.display = 'none';
            document.getElementById('label-monto').innerText = 'Monto del Bono';
            document.getElementById('precio-botella').value = 0;
        } else {
            document.getElementById('cont-precio').style.display = 'block';
            document.getElementById('label-monto').innerText = 'Comisión';
        }
    }

    function guardarComision() {
        const fecha = document.getElementById('fecha-reg').value;
        const taxista = inputBusqueda.value;
        const precio = parseFloat(document.getElementById('precio-botella').value) || 0;
        const monto = parseFloat(document.getElementById('monto-comision').value) || 0;

        if(!taxista || monto <= 0) return alert("Faltan datos o el monto es 0");
        if(tipoSeleccionado === 'Botella' && precio <= 0) return alert("Poner precio de botella");

        db.collection("comisiones_taxis").add({
            f: fecha, 
            t: taxista, 
            b: tipoSeleccionado, // Guardamos 'Botella' o 'Bono'
            p: precio, 
            m: monto, 
            ts: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("¡Registrado como " + tipoSeleccionado + "!");
            document.getElementById('monto-comision').value = "";
            document.getElementById('precio-botella').value = "";
            inputBusqueda.value = "";
        });
    }

    function verResumen() {
        const fecha = document.getElementById('fecha-reg').value;
        db.collection("comisiones_taxis").where("f", "==", fecha).orderBy("ts", "desc").get().then(snap => {
            const body = document.getElementById('body-resumen');
            const foot = document.getElementById('foot-resumen');
            body.innerHTML = "";
            let totalBotellas = 0;
            let totalPagos = 0;

            snap.forEach(doc => {
                const d = doc.data();
                totalBotellas += (d.p || 0);
                totalPagos += (d.m || 0);
                body.innerHTML += `<tr>
                    <td style="color:#d4af37;">${d.t}</td>
                    <td>${d.b}</td>
                    <td>S/ ${d.p}</td>
                    <td style="font-weight:bold;">S/ ${d.m}</td>
                    <td><button class="btn-del" onclick="eliminarRegistro('${doc.id}')">🗑</button></td>
                </tr>`;
            });
            foot.innerHTML = `<tr class="fila-total">
                <td colspan="2">TOTAL</td>
                <td>S/ ${totalBotellas}</td>
                <td>S/ ${totalPagos}</td>
                <td></td>
            </tr>`;
            document.getElementById('titulo-fecha').innerText = "RESUMEN: " + fecha;
            document.getElementById('modalResumen').style.display = "block";
        });
    }

    // Funciones Admin
    function abrirAdmin() { 
        document.getElementById('modalAdmin').style.display = "block"; 
        mostrarItems();
    }
    function cerrarModal() { document.getElementById('modalAdmin').style.display = "none"; }
    function cerrarResumen() { document.getElementById('modalResumen').style.display = "none"; }

    function mostrarItems() {
        db.collection("config_taxis").doc("taxistas").get().then(doc => {
            const div = document.getElementById('lista-items');
            div.innerHTML = "";
            if(doc.exists && doc.data().nombres) {
                doc.data().nombres.sort().forEach(n => {
                    div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;">
                        <span>${n}</span>
                        <span style="color:#ff4444;" onclick="eliminarItemLista('${n}')">✕</span>
                    </div>`;
                });
            }
        });
    }

    function agregarItem() {
        const val = document.getElementById('nuevo-item').value.trim();
        if(!val) return;
        db.collection("config_taxis").doc("taxistas").set({ nombres: firebase.firestore.FieldValue.arrayUnion(val) }, {merge:true}).then(() => {
            document.getElementById('nuevo-item').value = "";
            mostrarItems();
        });
    }

    function eliminarItemLista(val) {
        if(confirm("¿Eliminar?")) {
            db.collection("config_taxis").doc("taxistas").update({ nombres: firebase.firestore.FieldValue.arrayRemove(val) }).then(() => mostrarItems());
        }
    }

    function eliminarRegistro(id) {
        if(confirm("¿Borrar registro?")) {
            db.collection("comisiones_taxis").doc(id).delete().then(() => verResumen());
        }
    }
</script>
</body>
</html>
