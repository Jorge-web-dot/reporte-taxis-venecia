<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Taxis - Venecia</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h1 { text-align: center; color: #d4af37; font-size: 1.2em; text-transform: uppercase; letter-spacing: 2px; }
        
        .section { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #d4af37; }
        label { display: block; font-size: 0.75em; color: #d4af37; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 1em; }
        
        .btn-gold { background: #d4af37; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-outline { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 12px; border-radius: 8px; font-size: 0.9em; cursor: pointer; margin-bottom: 10px; width: 100%; font-weight: bold; }

        .tabla-resumen { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        .tabla-resumen th { background: #d4af37; color: black; padding: 8px; border: 1px solid #333; }
        .tabla-resumen td { padding: 8px; border: 1px solid #333; text-align: center; background: #111; }
        
        .fila-total { background: #222; color: #ffffff !important; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #1a1a1a; margin: 10% auto; padding: 20px; border: 1px solid #d4af37; width: 95%; max-width: 600px; border-radius: 12px; position: relative; }
        
        .flex-inputs { display: flex; gap: 10px; }
        .flex-inputs div { flex: 1; }
        .btn-cerrar { background: #ff4444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; float: right; font-weight: bold; margin-bottom: 10px; }
        .btn-del { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 1.2em; font-weight: bold; }
        .btn-edit { background: none; border: none; color: #d4af37; cursor: pointer; font-size: 1.1em; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>COMISIONES TAXISTAS</h1>
    <div class="section">
        <label>Fecha</label>
        <input type="date" id="fecha-reg">

        <label>Taxista</label>
        <div style="display: flex; gap: 5px;">
            <select id="select-taxista"><option value="">Seleccionar...</option></select>
            <button class="btn-outline" style="width: 50px;" onclick="abrirAdmin('taxistas')">+</button>
        </div>

        <label>Botella / Producto</label>
        <div style="display: flex; gap: 5px;">
            <select id="select-botella"><option value="">Seleccionar...</option></select>
            <button class="btn-outline" style="width: 50px;" onclick="abrirAdmin('botellas')">+</button>
        </div>

        <div class="flex-inputs">
            <div>
                <label>Precio Botella</label>
                <input type="number" id="precio-botella" placeholder="1000">
            </div>
            <div>
                <label>Comisión</label>
                <input type="number" id="monto-comision" placeholder="50">
            </div>
        </div>
        <button class="btn-gold" onclick="guardarComision()">GUARDAR REGISTRO</button>
    </div>
    <button class="btn-outline" onclick="verResumen()">VER RESUMEN DE FECHA</button>
</div>

<div id="modalResumen" class="modal">
    <div class="modal-content">
        <button class="btn-cerrar" onclick="cerrarResumen()">CERRAR X</button>
        <h2 id="titulo-fecha" style="color:#d4af37; font-size:1.1em; text-align:center; text-transform: uppercase; margin-top: 40px;"></h2>
        <table class="tabla-resumen">
            <thead>
                <tr>
                    <th>TAXISTA</th>
                    <th>BOTELLA</th>
                    <th>PRECIO</th>
                    <th>COMISIÓN</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="body-resumen"></tbody>
            <tfoot id="foot-resumen"></tfoot>
        </table>
    </div>
</div>

<div id="modalEditar" class="modal">
    <div class="modal-content">
        <h3 style="color:#d4af37; margin-top:0;">EDITAR REGISTRO</h3>
        <input type="hidden" id="edit-id">
        
        <label>Taxista</label>
        <select id="edit-taxista"></select>

        <label>Botella / Producto</label>
        <select id="edit-botella"></select>

        <div class="flex-inputs">
            <div>
                <label>Precio</label>
                <input type="number" id="edit-precio">
            </div>
            <div>
                <label>Comisión</label>
                <input type="number" id="edit-comision">
            </div>
        </div>
        
        <button class="btn-gold" onclick="actualizarRegistro()">GUARDAR CAMBIOS</button>
        <button class="btn-gold" style="background:#444; color:white; margin-top:10px;" onclick="document.getElementById('modalEditar').style.display='none'">CANCELAR</button>
    </div>
</div>

<div id="modalAdmin" class="modal">
    <div class="modal-content">
        <h3 id="tituloAdmin" style="color:#d4af37; margin-top:0;"></h3>
        <input type="text" id="nuevo-item" placeholder="Escribir nombre...">
        <button class="btn-gold" onclick="agregarItem()">AGREGAR A LA LISTA</button>
        <div id="lista-items" style="margin-top:15px; max-height:200px; overflow-y:auto; font-size:0.8em; background: #000; padding: 5px;"></div>
        <button class="btn-gold" style="background:#444; color:white; margin-top:10px;" onclick="cerrarModal()">VOLVER</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKJ0vJGvnzIdkKIvD1w0NCStA19T-TzoM",
        authDomain: "venecia-control.firebaseapp.com",
        projectId: "venecia-control",
        storageBucket: "venecia-control.firebasestorage.app",
        messagingSenderId: "486778694402",
        appId: "1:486778694402:web:4276617163b85b5b7bf01b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('fecha-reg').value = new Date().toISOString().split('T')[0];
    cargarListas();

    function cargarListas() {
        db.collection("config_taxis").doc("taxistas").onSnapshot(doc => { 
            if(doc.exists) {
                actualizarSelect("select-taxista", doc.data().nombres);
                actualizarSelect("edit-taxista", doc.data().nombres);
            } 
        });
        db.collection("config_taxis").doc("botellas").onSnapshot(doc => { 
            if(doc.exists) {
                actualizarSelect("select-botella", doc.data().nombres);
                actualizarSelect("edit-botella", doc.data().nombres);
            } 
        });
    }

    function actualizarSelect(id, array) {
        const sel = document.getElementById(id);
        sel.innerHTML = '<option value="">Seleccionar...</option>';
        if(array) array.sort().forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
    }

    function abrirAdmin(tipo) {
        tipoAdminActual = tipo;
        document.getElementById('tituloAdmin').innerText = "ADMINISTRAR " + tipo.toUpperCase();
        document.getElementById('modalAdmin').style.display = "block";
        mostrarItems(tipo);
    }

    function mostrarItems(tipo) {
        db.collection("config_taxis").doc(tipo).get().then(doc => {
            const div = document.getElementById('lista-items');
            div.innerHTML = "";
            if(doc.exists && doc.data().nombres) {
                doc.data().nombres.sort().forEach(n => {
                    div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #333;">
                        <span>${n}</span>
                        <span style="color:#ff4444; cursor:pointer;" onclick="eliminarItemLista('${n}')">✕</span>
                    </div>`;
                });
            }
        });
    }

    function agregarItem() {
        const val = document.getElementById('nuevo-item').value.trim();
        if(!val) return;
        db.collection("config_taxis").doc(tipoAdminActual).set({ nombres: firebase.firestore.FieldValue.arrayUnion(val) }, {merge:true}).then(() => {
            document.getElementById('nuevo-item').value = "";
            mostrarItems(tipoAdminActual);
        });
    }

    function eliminarItemLista(val) {
        if(confirm("¿Eliminar de la lista?")) {
            db.collection("config_taxis").doc(tipoAdminActual).update({ nombres: firebase.firestore.FieldValue.arrayRemove(val) }).then(() => mostrarItems(tipoAdminActual));
        }
    }

    function cerrarModal() { document.getElementById('modalAdmin').style.display = "none"; }
    function cerrarResumen() { document.getElementById('modalResumen').style.display = "none"; }

    function guardarComision() {
        const fecha = document.getElementById('fecha-reg').value;
        const taxista = document.getElementById('select-taxista').value;
        const botella = document.getElementById('select-botella').value;
        const precio = document.getElementById('precio-botella').value;
        const comision = document.getElementById('monto-comision').value;
        if(!taxista || !botella || !precio || !comision) return alert("Faltan datos");

        db.collection("comisiones_taxis").add({
            f: fecha, t: taxista, b: botella, p: parseFloat(precio), m: parseFloat(comision), ts: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("¡Guardado!");
            document.getElementById('precio-botella').value = "";
            document.getElementById('monto-comision').value = "";
        });
    }

    function verResumen() {
        const fecha = document.getElementById('fecha-reg').value;
        db.collection("comisiones_taxis").where("f", "==", fecha).orderBy("ts", "desc").get().then(snap => {
            const body = document.getElementById('body-resumen');
            const foot = document.getElementById('foot-resumen');
            body.innerHTML = "";
            let totalBotellas = 0;
            let totalComisiones = 0;

            if (snap.empty) {
                body.innerHTML = "<tr><td colspan='5'>Sin registros.</td></tr>";
                foot.innerHTML = "";
            } else {
                snap.forEach(doc => {
                    const d = doc.data();
                    totalBotellas += (d.p || 0);
                    totalComisiones += (d.m || 0);
                    body.innerHTML += `<tr>
                        <td style="color:#d4af37; font-weight:bold;">${d.t}</td>
                        <td>${d.b}</td>
                        <td>S/ ${d.p}</td>
                        <td style="font-weight:bold;">S/ ${d.m}</td>
                        <td>
                            <button class="btn-edit" onclick="prepararEdicion('${doc.id}', '${d.t}', '${d.b}', ${d.p}, ${d.m})">✏️</button>
                            <button class="btn-del" onclick="eliminarRegistro('${doc.id}')">🗑</button>
                        </td>
                    </tr>`;
                });
                foot.innerHTML = `<tr class="fila-total">
                    <td colspan="2">TOTALES</td>
                    <td>S/ ${totalBotellas}</td>
                    <td>S/ ${totalComisiones}</td>
                    <td></td>
                </tr>`;
            }
            document.getElementById('titulo-fecha').innerText = "RESUMEN: " + fecha;
            document.getElementById('modalResumen').style.display = "block";
        });
    }

    // --- NUEVAS FUNCIONES DE EDICIÓN ---
    function prepararEdicion(id, taxista, botella, precio, comision) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-taxista').value = taxista;
        document.getElementById('edit-botella').value = botella;
        document.getElementById('edit-precio').value = precio;
        document.getElementById('edit-comision').value = comision;
        document.getElementById('modalEditar').style.display = 'block';
    }

    function actualizarRegistro() {
        const id = document.getElementById('edit-id').value;
        const taxista = document.getElementById('edit-taxista').value;
        const botella = document.getElementById('edit-botella').value;
        const precio = parseFloat(document.getElementById('edit-precio').value);
        const comision = parseFloat(document.getElementById('edit-comision').value);

        if(!taxista || !botella || isNaN(precio) || isNaN(comision)) return alert("Datos inválidos");

        db.collection("comisiones_taxis").doc(id).update({
            t: taxista, b: botella, p: precio, m: comision
        }).then(() => {
            alert("Registro actualizado");
            document.getElementById('modalEditar').style.display = 'none';
            verResumen(); // Refresca la tabla
        }).catch(err => alert("Error: " + err));
    }

    function eliminarRegistro(id) {
        if(confirm("¿Seguro que quieres borrar este registro?")) {
            db.collection("comisiones_taxis").doc(id).delete().then(() => { verResumen(); });
        }
    }
</script>
</body>
</html>
